services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trade_training}
      MYSQL_USER: ${MYSQL_USER:-trade_training}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-trade_training_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_change_me}
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      target: development
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://${MYSQL_USER:-trade_training}:${MYSQL_PASSWORD:-trade_training_password}@db:3306/${MYSQL_DATABASE:-trade_training}
      AUTH_SECRET: ${AUTH_SECRET:-replace-this-development-secret}
      WATCHPACK_POLLING: "true"
    ports:
      - "${APP_PORT:-13000}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    command: npm run dev

volumes:
  mysql_data:
  node_modules:
  next_cache:
